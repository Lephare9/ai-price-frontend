<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pris Scanner</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
}

img {
  width: 100%;
  margin-top: 10px;
}

.card {
  margin-top: 20px;
  padding: 10px;
  border: 1px solid #ddd;
}
</style>
</head>

<body>

<h1>📸 AI Pris Scanner</h1>

<input type="file" id="file" accept="image/*">

<div id="status"></div>
<div id="result"></div>

<script>
console.log("🔥 VERSION 100 LOADED");

const API_URL = "https://ai-pricing-agent.onrender.com/analyze";

document.getElementById("file").addEventListener("change", async function () {

  const file = this.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("file", file);

  const imageURL = URL.createObjectURL(file);

  document.getElementById("status").innerText = "Analyserer...";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    console.log("🔥 API DATA:", data);

    document.getElementById("status").innerText = "";

    document.getElementById("result").innerHTML = `
      <div class="card">
        <img src="${imageURL}">
        <h3>${data.description}</h3>
        <h2>${data.price_range}</h2>
        <p>Hits: ${data.hits_total}</p>
        <p>Confidence: ${data.confidence}%</p>
      </div>
    `;

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Fejl";
  }

});
</script>

</body>
</html>
