<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Pris Scanner</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f7;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .upload-box {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    input {
      margin-top: 10px;
    }

    button {
      background: black;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      margin-top: 15px;
      width: 100%;
    }

    button:disabled {
      background: #999;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 16px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      margin-top: 20px;
      text-align: left;
    }

    img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .name {
      font-size: 18px;
      color: #444;
    }

    .price {
      font-size: 32px;
      font-weight: bold;
      margin: 8px 0;
    }

    .reason {
      font-size: 14px;
      color: #777;
    }

    .loader {
      margin-top: 15px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

  <h1>📸 AI Pris Scanner</h1>

  <div class="upload-box">
    <input type="file" id="file" accept="image/*"><br>
    <button id="btn" onclick="upload()">Scan genstand</button>
    <div id="status" class="loader"></div>
  </div>

  <div id="result"></div>

  <script>
    async function upload() {
      const fileInput = document.getElementById("file");
      const file = fileInput.files[0];
      const btn = document.getElementById("btn");

      if (!file) {
        alert("Vælg et billede først");
        return;
      }

      const formData = new FormData();
      formData.append("file", file);

      const imageURL = URL.createObjectURL(file);

      btn.disabled = true;
      document.getElementById("status").innerText = "⏳ Analyserer billede...";

      try {
        const res = await fetch("https://ai-pricing-agent.onrender.com/analyze", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        document.getElementById("result").innerHTML = `
          <div class="card">
            <img src="${imageURL}" />
            <div class="name">${data.description}</div>
            <div class="price">${data.price} kr</div>
            <div class="reason">${data.reason || ""}</div>
          </div>
        `;
      } catch (err) {
        document.getElementById("status").innerText = "❌ Der opstod en fejl";
      }

      document.getElementById("status").innerText = "";
      btn.disabled = false;
    }
  </script>

</body>
</html>
