<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pris Scanner</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h1 {
  text-align: center;
  font-size: 22px;
  margin-bottom: 30px;
}

.scan-btn {
  width: 100%;
  padding: 18px;
  font-size: 18px;
  border-radius: 14px;
  border: none;
  background: black;
  color: white;
  font-weight: bold;
}

.card {
  background: white;
  margin-top: 20px;
  padding: 16px;
  border-radius: 16px;
}

img {
  width: 100%;
  border-radius: 12px;
}

.name {
  font-size: 18px;
  margin-top: 10px;
}

.price {
  font-size: 30px;
  font-weight: bold;
  margin-top: 5px;
}

.reason {
  font-size: 14px;
  color: #666;
  margin-top: 10px;
}

#status {
  text-align: center;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<h1>📸 AI Pris Scanner</h1>

<input type="file" id="file" accept="image/*" capture="environment" style="display:none"/>

<button class="scan-btn" onclick="openCamera()">📸 Scan genstand</button>

<div id="status"></div>
<div id="result"></div>

</div>

<script>
const API_URL = "https://ai-pricing-agent.onrender.com/analyze";

function openCamera() {
  document.getElementById("file").click();
}

document.getElementById("file").addEventListener("change", async function () {
  const file = this.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("file", file);

  const imageURL = URL.createObjectURL(file);

  document.getElementById("status").innerText = "⏳ Analyserer...";
  document.getElementById("result").innerHTML = "";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    console.log("DATA:", data);

    // Failsafe værdier
    const name = data.description ? data.description : "ukendt";
    const price = data.price_range ? data.price_range : "0 - 0 kr";
    const hits = data.hits_total ? data.hits_total : 0;
    const exact = data.hits_exact ? data.hits_exact : 0;
    const similar = data.hits_similar ? data.hits_similar : 0;
    const confidence = data.confidence ? data.confidence : 0;

    document.getElementById("status").innerText = "";

    const resultDiv = document.getElementById("result");

    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    img.src = imageURL;

    const nameDiv = document.createElement("div");
    nameDiv.className = "name";
    nameDiv.innerText = name;

    const priceDiv = document.createElement("div");
    priceDiv.className = "price";
    priceDiv.innerText = price;

    const reasonDiv = document.createElement("div");
    reasonDiv.className = "reason";
    reasonDiv.innerHTML =
      "🔎 " + hits + " fundet<br>" +
      "✅ " + exact + " identiske<br>" +
      "🔄 " + similar + " lignende<br>" +
      "📊 Confidence: " + confidence + "%";

    card.appendChild(img);
    card.appendChild(nameDiv);
    card.appendChild(priceDiv);
    card.appendChild(reasonDiv);

    resultDiv.appendChild(card);

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "❌ Fejl – prøv igen";
  }
});
</script>

</body>
</html>
