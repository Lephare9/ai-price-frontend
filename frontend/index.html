<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pris Scanner</title>
</head>

<body>

<h1>📸 AI Pris Scanner</h1>

<input type="file" id="file" accept="image/*">

<div id="status"></div>
<div id="result"></div>

<script>
console.log("🔥 SCRIPT LOADED");

const API_URL = "https://ai-pricing-agent.onrender.com/analyze";

document.getElementById("file").addEventListener("change", async function () {

  const file = this.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("file", file);

  document.getElementById("status").innerText = "Analyserer...";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    console.log("🔥 DATA:", data);

    document.getElementById("status").innerText = "";

    document.getElementById("result").innerHTML =
      "<h2>" + data.description + "</h2>" +
      "<h1>" + data.price_range + "</h1>";

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Fejl";
  }

});
</script>

</body>
</html>
