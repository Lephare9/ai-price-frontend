<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Pris</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: #0f172a;
  color: white;
}

.header {
  padding: 20px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.upload-box {
  border: 2px dashed #334155;
  border-radius: 16px;
  padding: 30px;
  text-align: center;
  margin-bottom: 20px;
}

.upload-box img {
  width: 100%;
  border-radius: 12px;
  margin-top: 10px;
}

.button {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 18px;
  font-weight: bold;
}

.button:active {
  transform: scale(0.98);
}

.result {
  text-align: center;
  margin-top: 30px;
}

.name {
  font-size: 18px;
}

.price {
  font-size: 40px;
  font-weight: bold;
  color: #22c55e;
  margin-top: 10px;
}

.loader {
  margin: 20px auto;
  border: 4px solid #334155;
  border-top: 4px solid #22c55e;
  border-radius: 50%;
  width: 35px;
  height: 35px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="header">📸 AI Prisvurdering</div>

<div class="container">

  <div class="upload-box" onclick="pickFile()">
    Tryk for at tage billede / vælge
    <input type="file" id="fileInput" accept="image/*" capture="environment" hidden>
    <div id="preview"></div>
  </div>

  <button class="button" onclick="upload()">Vurder pris</button>

  <div id="loading"></div>

  <div class="result" id="result"></div>

</div>

<script>
let selectedFile = null;

function pickFile() {
  document.getElementById("fileInput").click();
}

document.getElementById("fileInput").onchange = function(e) {
  const file = e.target.files[0];
  if (!file) return;

  selectedFile = file;

  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById("preview").innerHTML =
      `<img src="${e.target.result}">`;
  };
  reader.readAsDataURL(file);
};

async function upload() {
  if (!selectedFile) {
    alert("Vælg eller tag et billede");
    return;
  }

  document.getElementById("loading").innerHTML = `<div class="loader"></div>`;
  document.getElementById("result").innerHTML = "";

  const formData = new FormData();
  formData.append("file", selectedFile);

  try {
    const res = await fetch("https://ai-pricing-agent.onrender.com/analyze", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    document.getElementById("loading").innerHTML = "";

    document.getElementById("result").innerHTML = `
      <div class="name">${data.description}</div>
      <div class="price">${data.price} kr</div>
    `;

  } catch (err) {
    document.getElementById("loading").innerHTML = "❌ Fejl";
  }
}
</script>

</body>
</html>
