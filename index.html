<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pris Scanner</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h1 {
  text-align: center;
}

.btn {
  width: 100%;
  padding: 18px;
  font-size: 18px;
  border-radius: 14px;
  border: none;
  background: black;
  color: white;
  margin-top: 10px;
}

.card {
  background: white;
  margin-top: 20px;
  padding: 16px;
  border-radius: 16px;
}

img {
  width: 100%;
  border-radius: 12px;
}

.price {
  font-size: 32px;
  font-weight: bold;
}

#status {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>AI Pris Scanner</h1>

<input type="file" id="file" accept="image/*" capture="environment">

<div id="status"></div>
<div id="result"></div>

</div>

<script>
const API_URL = "https://ai-pricing-agent.onrender.com/analyze";

document.getElementById("file").addEventListener("change", async function () {

  const file = this.files[0];
  if (!file) return;

  // 🔥 NYT: vis korrekt billede med det samme
  const preview = URL.createObjectURL(file);

  document.getElementById("result").innerHTML = `
    <div class="card">
      <img src="${preview}">
      <p>Analyserer...</p>
    </div>
  `;

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    document.getElementById("result").innerHTML = `
      <div class="card">
        <img src="${preview}">
        <h3>${data.description}</h3>
        <div class="price">${data.price_range}</div>
        <p>${data.hits_total} fund • ${data.confidence}%</p>
      </div>
    `;

  } catch (err) {
    document.getElementById("status").innerText = "Fejl";
  }

});
</script>

</body>
</html>
