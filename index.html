<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pris Scanner</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.btn {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  background: black;
  color: white;
  margin-bottom: 10px;
  font-size: 16px;
}

.btn.secondary {
  background: #444;
}

.card {
  background: white;
  margin-top: 20px;
  padding: 15px;
  border-radius: 12px;
}

img {
  width: 100%;
  border-radius: 10px;
}

.price {
  font-size: 28px;
  font-weight: bold;
}

.meta {
  color: #666;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

<h1>AI Pris Scanner</h1>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
<input type="file" id="galleryInput" accept="image/*" style="display:none">

<button class="btn" onclick="openCamera()">📷 Tag billede</button>
<button class="btn secondary" onclick="openGallery()">🗂️ Arkiv</button>

<div id="result"></div>

</div>

<script>
const API_URL = "https://ai-pricing-agent.onrender.com/analyze";

function openCamera() {
  document.getElementById("cameraInput").click();
}

function openGallery() {
  document.getElementById("galleryInput").click();
}

document.getElementById("cameraInput").addEventListener("change", handleFile);
document.getElementById("galleryInput").addEventListener("change", handleFile);


// ---------- RESIZE ----------
function resizeImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const MAX = 1024;

      const scale = MAX / img.width;

      canvas.width = MAX;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.7);
    };

    reader.readAsDataURL(file);
  });
}


// ---------- MAIN ----------
async function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;

  const preview = URL.createObjectURL(file);

  // vis med det samme
  document.getElementById("result").innerHTML = `
    <div class="card">
      <img src="${preview}" />
      <p>Analyserer...</p>
    </div>
  `;

  const resized = await resizeImage(file);

  const formData = new FormData();
  formData.append("file", resized, "image.jpg");

  const res = await fetch(API_URL, {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  document.getElementById("result").innerHTML = `
    <div class="card">
      <img src="${preview}" />
      <h3>${data.description}</h3>
      <div class="price">${data.price_range}</div>
      <div class="meta">
        ${data.hits_total} fund • ${data.confidence}% sikkerhed
      </div>
    </div>
  `;
}
</script>

</body>
</html>
