<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pris Scanner</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h1 {
  text-align: center;
  font-size: 22px;
  margin-bottom: 30px;
}

.btn {
  width: 100%;
  padding: 18px;
  font-size: 18px;
  border-radius: 14px;
  border: none;
  background: black;
  color: white;
  font-weight: bold;
}

.btn.secondary {
  background: #444;
  margin-top: 10px;
}

.card {
  background: white;
  margin-top: 20px;
  padding: 16px;
  border-radius: 16px;
}

img {
  width: 100%;
  border-radius: 12px;
}

.name {
  margin-top: 10px;
}

.price {
  font-size: 30px;
  font-weight: bold;
}

.meta {
  font-size: 12px;
  color: #666;
}

#status {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>AI Pris Scanner</h1>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
<input type="file" id="galleryInput" accept="image/*" style="display:none">

<button class="btn" onclick="openCamera()">📷 Tag billede</button>
<button class="btn secondary" onclick="openGallery()">🗂️ Vælg fra arkiv</button>

<div id="status"></div>
<div id="result"></div>

</div>

<script>
const API_URL = "https://ai-pricing-agent.onrender.com/analyze";

function openCamera() {
  document.getElementById("cameraInput").click();
}

function openGallery() {
  document.getElementById("galleryInput").click();
}

document.getElementById("cameraInput").addEventListener("change", handleFile);
document.getElementById("galleryInput").addEventListener("change", handleFile);


// ---------- RESIZE ----------
function resizeImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const MAX = 1024;

      const scale = MAX / img.width;

      canvas.width = MAX;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.7);
    };

    reader.readAsDataURL(file);
  });
}


// ---------- MAIN ----------
async function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;

  const previewURL = URL.createObjectURL(file);

  // 🔥 VIS BILLEDE MED DET SAMME
  document.getElementById("result").innerHTML = `
    <div class="card">
      <img src="${previewURL}" />
      <div class="name">Analyserer...</div>
    </div>
  `;

  document.getElementById("status").innerText = "";

  // resize i baggrunden
  const resized = await resizeImage(file);

  const formData = new FormData();
  formData.append("file", resized, "image.jpg");

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    // 🔥 OPDATER RESULTAT
    document.getElementById("result").innerHTML = `
      <div class="card">
        <img src="${previewURL}" />
        <div class="name">${data.description}</div>
        <div class="price">${data.price_range}</div>
        <div class="meta">
          ${data.hits_total} fund • ${data.confidence}% sikkerhed
        </div>
      </div>
    `;

  } catch (err) {
    document.getElementById("status").innerText = "Fejl";
  }
}
</script>

</body>
</html>
