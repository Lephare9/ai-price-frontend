<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pris Scanner</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #f7f7f8, #e9ebef);
  margin: 0;
  padding: 20px;
}

/* Container */
.container {
  max-width: 520px;
  margin: auto;
}

/* Title */
h1 {
  text-align: center;
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 20px;
}

/* Grid */
.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

/* Card buttons */
.action-card {
  aspect-ratio: 1 / 1;
  border-radius: 20px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: 0.2s;
  position: relative;
  overflow: hidden;
}

/* Press effect */
.action-card:active {
  transform: scale(0.96);
}

/* Camera card */
.camera {
  background: linear-gradient(145deg, #1a1a1a, #000);
  color: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* Lens */
.lens {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #6fd3ff, #001f3f 60%, #000);
  box-shadow:
    inset 0 0 15px rgba(255,255,255,0.2),
    0 0 15px rgba(0,0,0,0.6);
  margin-bottom: 10px;
}

/* Gallery card */
.gallery {
  background: linear-gradient(145deg, #ffe066, #ffd43b);
  box-shadow: 0 10px 25px rgba(255, 200, 0, 0.3);
}

/* Folder icon */
.folder {
  width: 70px;
  height: 50px;
  background: #ffcc00;
  border-radius: 6px;
  position: relative;
  margin-bottom: 12px;
}

.folder:before {
  content: "";
  position: absolute;
  top: -10px;
  left: 8px;
  width: 30px;
  height: 12px;
  background: #ffd43b;
  border-radius: 4px 4px 0 0;
}

/* Label */
.label {
  font-size: 15px;
  font-weight: 600;
}

/* Hide inputs */
input {
  display: none;
}

/* Result card */
.card {
  margin-top: 20px;
  padding: 16px;
  border-radius: 20px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(20px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

img {
  width: 100%;
  border-radius: 14px;
}

.name {
  font-size: 18px;
  margin-top: 10px;
  font-weight: 600;
}

.price {
  font-size: 30px;
  font-weight: 700;
  margin-top: 6px;
}

.meta {
  font-size: 13px;
  color: #555;
  margin-top: 6px;
}

.loading {
  text-align: center;
  color: #666;
  padding: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>AI Pris Scanner</h1>

<div class="actions">

  <!-- Kamera -->
  <label class="action-card camera">
    <div class="lens"></div>
    <div class="label">Tag foto</div>
    <input type="file" id="cameraInput" accept="image/*" capture="environment">
  </label>

  <!-- Arkiv -->
  <label class="action-card gallery">
    <div class="folder"></div>
    <div class="label">Arkiv</div>
    <input type="file" id="fileInput" accept="image/*">
  </label>

</div>

<div id="result"></div>

</div>

<script>
const API_URL = "https://ai-pricing-agent.onrender.com/analyze";

document.getElementById("cameraInput").addEventListener("change", handleFile);
document.getElementById("fileInput").addEventListener("change", handleFile);

async function handleFile(e) {

  const file = e.target.files[0];
  if (!file) return;

  const preview = URL.createObjectURL(file);
  const resultEl = document.getElementById("result");

  resultEl.innerHTML = `
    <div class="card">
      <img src="${preview}">
      <div class="loading">Analyserer...</div>
    </div>
  `;

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (!data.price_range || data.price_range === "-") {
      throw new Error();
    }

    resultEl.innerHTML = `
      <div class="card">
        <img src="${preview}">
        <div class="name">${data.description}</div>
        <div class="price">${data.price_range}</div>
        <div class="meta">Sikkerhed: ${data.confidence}%</div>
      </div>
    `;

  } catch (err) {
    resultEl.innerHTML = `
      <div class="card">
        <img src="${preview}">
        <div class="meta">⚠️ Kunne ikke analysere</div>
      </div>
    `;
  }
}
</script>

</body>
</html>
