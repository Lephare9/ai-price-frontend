<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pris Scanner</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f7f7f8;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 520px;
  margin: auto;
}

h1 {
  text-align: center;
  font-size: 24px;
  margin-bottom: 20px;
}

.btn {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  margin-bottom: 10px;
  font-size: 16px;
  font-weight: 600;
}

.camera {
  background: black;
  color: white;
}

.gallery {
  background: white;
  border: 1px solid #ddd;
}

input {
  display: none;
}

.card {
  background: white;
  margin-top: 20px;
  padding: 16px;
  border-radius: 16px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

img {
  width: 100%;
  border-radius: 12px;
}

.name {
  font-size: 18px;
  margin-top: 10px;
  font-weight: 600;
}

.price {
  font-size: 28px;
  font-weight: bold;
  margin-top: 6px;
}

.meta {
  font-size: 13px;
  color: #777;
  margin-top: 6px;
}

.loading {
  text-align: center;
  color: #666;
  padding: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>AI Pris Scanner</h1>

<label class="btn camera">
  📸 Tag foto
  <input type="file" id="cameraInput" accept="image/*" capture="environment">
</label>

<label class="btn gallery">
  🖼️ Vælg fra arkiv
  <input type="file" id="fileInput" accept="image/*">
</label>

<div id="result"></div>

</div>

<script>
const API_URL = "https://ai-pricing-agent.onrender.com/analyze";

document.getElementById("cameraInput").addEventListener("change", handleFile);
document.getElementById("fileInput").addEventListener("change", handleFile);

async function handleFile(e) {

  const file = e.target.files[0];
  if (!file) return;

  const preview = URL.createObjectURL(file);
  const resultEl = document.getElementById("result");

  resultEl.innerHTML = `
    <div class="card">
      <img src="${preview}">
      <div class="loading">Analyserer...</div>
    </div>
  `;

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (!data.price_range || data.price_range === "-") {
      throw new Error();
    }

    resultEl.innerHTML = `
      <div class="card">
        <img src="${preview}">
        <div class="name">${data.description}</div>
        <div class="price">${data.price_range}</div>
        <div class="meta">Sikkerhed: ${data.confidence}%</div>
      </div>
    `;

  } catch (err) {
    resultEl.innerHTML = `
      <div class="card">
        <img src="${preview}">
        <div class="meta">⚠️ Kunne ikke analysere</div>
      </div>
    `;
  }
}
</script>

</body>
</html>
