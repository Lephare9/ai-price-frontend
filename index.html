<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pris Scanner</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h1 {
  text-align: center;
  font-size: 22px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}

.card {
  background: white;
  margin-top: 20px;
  padding: 16px;
  border-radius: 16px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

img {
  width: 100%;
  border-radius: 12px;
}

.name {
  font-size: 18px;
  margin-top: 10px;
  font-weight: 600;
}

.price {
  font-size: 32px;
  font-weight: bold;
  margin-top: 6px;
}

.meta {
  font-size: 13px;
  color: #777;
  margin-top: 8px;
}

#status {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>AI Pris Scanner</h1>

<input type="file" id="file" accept="image/*" capture="environment">

<div id="status"></div>
<div id="result"></div>

</div>

<script>
const API_URL = "https://ai-pricing-agent.onrender.com/analyze";

document.getElementById("file").addEventListener("change", async function () {

  const file = this.files[0];
  if (!file) return;

  const preview = URL.createObjectURL(file);

  // 🔥 vis billede med det samme
  document.getElementById("result").innerHTML = `
    <div class="card">
      <img src="${preview}">
      <p>Analyserer...</p>
    </div>
  `;

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    // 🔥 fallback hvis AI fejler
    if (!data.price_range || data.price_range === "-") {
      document.getElementById("result").innerHTML = `
        <div class="card">
          <img src="${preview}">
          <p>⚠️ AI er travl – prøv igen</p>
        </div>
      `;
      return;
    }

    document.getElementById("result").innerHTML = `
      <div class="card">
        <img src="${preview}">
        <div class="name">${data.description}</div>
        <div class="price">${data.price_range}</div>
        <div class="meta">
          Sikkerhed: ${data.confidence}%
        </div>
      </div>
    `;

  } catch (err) {
    document.getElementById("result").innerHTML = `
      <div class="card">
        <img src="${preview}">
        <p>⚠️ Fejl – prøv igen</p>
      </div>
    `;
  }

});
</script>

</body>
</html>
