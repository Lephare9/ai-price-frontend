<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pris Scanner</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f7f7f8;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 520px;
  margin: auto;
}

.header {
  text-align: center;
  margin-bottom: 20px;
}

.header h1 {
  font-size: 26px;
  margin-bottom: 6px;
}

.header p {
  color: #666;
  font-size: 14px;
}

.upload-box {
  border: 2px dashed #ccc;
  border-radius: 16px;
  padding: 30px;
  text-align: center;
  cursor: pointer;
  background: white;
}

.upload-box:hover {
  border-color: #999;
}

input[type="file"] {
  display: none;
}

.card {
  background: white;
  margin-top: 20px;
  padding: 16px;
  border-radius: 16px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

img {
  width: 100%;
  border-radius: 12px;
}

.name {
  font-size: 18px;
  margin-top: 10px;
  font-weight: 600;
}

.price {
  font-size: 32px;
  font-weight: bold;
  margin-top: 6px;
}

.meta {
  font-size: 13px;
  color: #777;
  margin-top: 8px;
}

.loading {
  text-align: center;
  padding: 10px;
  color: #666;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>AI Pris Scanner</h1>
  <p>Upload et billede og få en prisvurdering</p>
</div>

<label class="upload-box">
  <input type="file" id="file" accept="image/*" capture="environment">
  <p>📸 Tryk for at tage billede</p>
</label>

<div id="result"></div>

</div>

<script>
const API_URL = "https://ai-pricing-agent.onrender.com/analyze";

document.getElementById("file").addEventListener("change", async function () {

  const file = this.files[0];
  if (!file) return;

  const preview = URL.createObjectURL(file);
  const resultEl = document.getElementById("result");

  resultEl.innerHTML = `
    <div class="card">
      <img src="${preview}">
      <div class="loading">Analyserer...</div>
    </div>
  `;

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (!data.price_range || data.price_range === "-") {
      throw new Error();
    }

    resultEl.innerHTML = `
      <div class="card">
        <img src="${preview}">
        <div class="name">${data.description}</div>
        <div class="price">${data.price_range}</div>
        <div class="meta">Sikkerhed: ${data.confidence}%</div>
      </div>
    `;

  } catch (err) {
    resultEl.innerHTML = `
      <div class="card">
        <img src="${preview}">
        <div class="meta">⚠️ Kunne ikke analysere</div>
      </div>
    `;
  }

});
</script>

</body>
</html>
