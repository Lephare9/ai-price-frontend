<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Pris Scanner</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f7;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: black;
      color: white;
      font-size: 16px;
      margin-top: 10px;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 16px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      margin-top: 20px;
      text-align: left;
    }

    img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .price {
      font-size: 32px;
      font-weight: bold;
      margin: 8px 0;
    }

    .reason {
      font-size: 14px;
      color: #777;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

<h1>📸 AI Pris Scanner</h1>

<!-- skjult file input -->
<input 
  type="file" 
  id="file" 
  accept="image/*" 
  capture="environment" 
  style="display:none"
/>

<button onclick="openCamera()">📸 Scan genstand</button>

<div id="status"></div>
<div id="result"></div>

<script>
const API_URL = "https://ai-pricing-agent.onrender.com/analyze";

// 🔁 retry + timeout
async function fetchWithRetry(url, options, retries = 2) {
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 20000);

    const response = await fetch(url, {
      ...options,
      signal: controller.signal
    });

    clearTimeout(timeout);

    if (!response.ok) throw new Error("Server fejl");

    return await response.json();

  } catch (err) {
    if (retries > 0) {
      console.log("🔁 retry...");
      return fetchWithRetry(url, options, retries - 1);
    }
    throw err;
  }
}

// 📸 åbner kamera
function openCamera() {
  document.getElementById("file").click();
}

// 🤖 auto upload når billede vælges
document.getElementById("file").addEventListener("change", async function () {
  const file = this.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("file", file);

  const imageURL = URL.createObjectURL(file);

  document.getElementById("status").innerText =
    "⏳ Starter AI... (kan tage 10-20 sek første gang)";
  document.getElementById("result").innerHTML = "";

  try {
    const data = await fetchWithRetry(API_URL, {
      method: "POST",
      body: formData
    });

    document.getElementById("status").innerText = "";

    document.getElementById("result").innerHTML = `
      <div class="card">
        <img src="${imageURL}" />
        <div>${data.description}</div>
        <div class="price">${data.price} kr</div>
        <div class="reason">${data.reason || ""}</div>
      </div>
    `;

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText =
      "❌ Fejl – prøv igen (server starter muligvis op)";
  }
});
</script>

</body>
</html>
